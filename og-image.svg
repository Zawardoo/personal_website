  <text x="80" y="380" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#71717a">Tvorba webových stránok na mieru</text>
  <text x="80" y="420" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#71717a">Automatizácia testovania softvéru</text>
  <text x="80" y="520" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#A855F7">jozefanyalai.com</text>
